<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mi perfil · Liquid Pricing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4 py-md-5">

    <div class="lp-section-header mb-4">
      <h1 class="h3">Mi perfil</h1>
    </div>

    <div id="contenido-perfil"></div>

  </main>

  <footer class="lp-footer text-center py-4 mt-5 text-muted">
    <div class="container small">© 2026 Liquid Pricing · Comparador de precios · Proyecto académico DSY2202</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { renderNavbar } from './js/ui.js';
    import { requiereRol, getSesion, setSesion } from './js/auth.js';
    import { getUsuarios, guardarUsuario } from './js/datos.js';
    import { requerido, emailValido, marcar, validarPassword, passwordValida, reglasPassword } from './js/validaciones.js';

    requiereRol('cliente');
    renderNavbar();

    const contenedor = document.getElementById('contenido-perfil');

    // Cargar usuario completo
    const s = getSesion();
    const usuarios = await getUsuarios();
    const u = usuarios.find(x => x.email === s.email);

    if (!u) {
      const msg = document.createElement('p');
      msg.className = 'text-danger';
      msg.textContent = 'No se pudo cargar el perfil. Por favor, vuelve a iniciar sesión.';
      contenedor.appendChild(msg);
    } else {
      renderPerfil(u);
    }

    // ── Render del formulario de perfil ───────────────────────
    function renderPerfil(usuario) {
      const row = document.createElement('div');
      row.className = 'row justify-content-center';

      const col = document.createElement('div');
      col.className = 'col-12 col-md-8 col-lg-6';

      // ── Tarjeta de datos personales ──────────────────────
      const cardDatos = document.createElement('div');
      cardDatos.className = 'lp-card mb-4';

      const tituloDatos = document.createElement('h2');
      tituloDatos.className = 'lp-card-title mb-4';
      tituloDatos.textContent = 'Datos personales';

      const form = document.createElement('form');
      form.id = 'form-perfil';
      form.noValidate = true;

      // RUT (solo lectura)
      const mbRut = document.createElement('div');
      mbRut.className = 'mb-3';
      const lblRut = document.createElement('label');
      lblRut.htmlFor = 'campo-rut';
      lblRut.className = 'form-label';
      lblRut.textContent = 'RUT';
      const inpRut = document.createElement('input');
      inpRut.type = 'text';
      inpRut.id = 'campo-rut';
      inpRut.className = 'form-control bg-light';
      inpRut.value = usuario.rut;
      inpRut.disabled = true;
      inpRut.setAttribute('aria-label', 'RUT (no editable)');
      const rutHint = document.createElement('div');
      rutHint.className = 'form-text';
      rutHint.textContent = 'El RUT es tu identificador y no puede modificarse.';
      mbRut.appendChild(lblRut);
      mbRut.appendChild(inpRut);
      mbRut.appendChild(rutHint);

      // Nombre
      const mbNombre = crearCampo('nombre', 'Nombre completo', 'text', usuario.nombre);

      // Email
      const mbEmail = crearCampo('email', 'Correo electrónico', 'email', usuario.email);

      // Teléfono
      const mbTelefono = crearCampo('telefono', 'Teléfono', 'tel', usuario.telefono ?? '');

      form.appendChild(mbRut);
      form.appendChild(mbNombre);
      form.appendChild(mbEmail);
      form.appendChild(mbTelefono);

      cardDatos.appendChild(tituloDatos);
      cardDatos.appendChild(form);

      // ── Tarjeta cambio de contraseña (colapsable) ────────
      const cardPass = document.createElement('div');
      cardPass.className = 'lp-card mb-4';

      const tituloPass = document.createElement('h2');
      tituloPass.className = 'lp-card-title mb-0';

      const btnTogglePass = document.createElement('button');
      btnTogglePass.type = 'button';
      btnTogglePass.className = 'btn btn-link p-0 text-decoration-none fw-semibold d-flex align-items-center gap-2';
      btnTogglePass.setAttribute('data-bs-toggle', 'collapse');
      btnTogglePass.setAttribute('data-bs-target', '#seccion-password');
      btnTogglePass.setAttribute('aria-expanded', 'false');
      btnTogglePass.setAttribute('aria-controls', 'seccion-password');
      btnTogglePass.innerHTML = '<i class="bi bi-lock"></i> Cambiar contraseña <i class="bi bi-chevron-down ms-1"></i>';

      tituloPass.appendChild(btnTogglePass);
      cardPass.appendChild(tituloPass);

      const collapsePass = document.createElement('div');
      collapsePass.id = 'seccion-password';
      collapsePass.className = 'collapse mt-3';

      const formPass = document.createElement('div');
      formPass.id = 'form-password';

      // Nueva contraseña
      const mbNueva = crearCampo('nueva-password', 'Nueva contraseña', 'password', '');
      const inpNueva = mbNueva.querySelector('input');

      // Checklist de reglas
      const checklist = document.createElement('ul');
      checklist.className = 'list-unstyled small mt-2 mb-3';
      checklist.id = 'checklist-password';
      reglasPassword.forEach(r => {
        const li = document.createElement('li');
        li.id = `regla-${r.id}`;
        li.className = 'text-muted';
        li.innerHTML = `<i class="bi bi-x-circle me-1"></i>${r.msg}`;
        checklist.appendChild(li);
      });
      mbNueva.appendChild(checklist);

      // Confirmar contraseña
      const mbConfirmar = crearCampo('confirmar-password', 'Confirmar contraseña', 'password', '');
      const inpConfirmar = mbConfirmar.querySelector('input');
      const fbConfirmar = mbConfirmar.querySelector('.invalid-feedback');
      fbConfirmar.textContent = 'Las contraseñas no coinciden.';

      formPass.appendChild(mbNueva);
      formPass.appendChild(mbConfirmar);
      collapsePass.appendChild(formPass);
      cardPass.appendChild(collapsePass);

      // ── Alerta de éxito ───────────────────────────────────
      const alerta = document.createElement('div');
      alerta.id = 'alerta-perfil';
      alerta.className = 'alert alert-success d-none';
      alerta.setAttribute('role', 'alert');
      alerta.innerHTML = '<i class="bi bi-check-circle me-2"></i>Cambios guardados correctamente.';

      // ── Botón guardar ─────────────────────────────────────
      const btnGuardar = document.createElement('button');
      btnGuardar.type = 'button';
      btnGuardar.id = 'btn-guardar';
      btnGuardar.className = 'btn btn-primary w-100';
      btnGuardar.innerHTML = '<i class="bi bi-floppy me-2"></i>Guardar cambios';

      col.appendChild(cardDatos);
      col.appendChild(cardPass);
      col.appendChild(alerta);
      col.appendChild(btnGuardar);
      row.appendChild(col);
      contenedor.appendChild(row);

      // ── Validación en vivo: datos personales ─────────────
      const inpNombre   = form.querySelector('#campo-nombre');
      const inpEmail    = form.querySelector('#campo-email');
      const inpTelefono = form.querySelector('#campo-telefono');
      const fbEmail     = form.querySelector('#feedback-email');

      [inpNombre, inpEmail, inpTelefono].forEach(inp => {
        inp.addEventListener('input', () => validarDatos());
        inp.addEventListener('blur', () => validarDatos());
      });

      async function validarDatos() {
        const nombreOk = marcar(inpNombre, requerido(inpNombre.value));

        const emailVal = inpEmail.value.trim();
        let emailOk = requerido(emailVal) && emailValido(emailVal);
        if (emailOk && emailVal.toLowerCase() !== usuario.email.toLowerCase()) {
          // Verificar que no esté tomado por otro usuario
          const todosUsuarios = await getUsuarios();
          const ocupado = todosUsuarios.some(
            x => x.email.toLowerCase() === emailVal.toLowerCase() && x.rut !== usuario.rut
          );
          if (ocupado) {
            emailOk = false;
            if (fbEmail) fbEmail.textContent = 'Este correo ya está registrado por otro usuario.';
          } else {
            if (fbEmail) fbEmail.textContent = 'Ingresa un correo válido.';
          }
        } else {
          if (fbEmail) fbEmail.textContent = 'Ingresa un correo válido.';
        }
        marcar(inpEmail, emailOk);

        const telVal = inpTelefono.value.trim();
        const telOk = marcar(inpTelefono, requerido(telVal) && /^\d{8,9}$/.test(telVal));

        return nombreOk && emailOk && telOk;
      }

      // ── Validación en vivo: contraseña ───────────────────
      inpNueva.addEventListener('input', () => {
        const v = inpNueva.value;
        const resultados = validarPassword(v);
        resultados.forEach(r => {
          const li = document.getElementById(`regla-${r.id}`);
          if (!li) return;
          if (r.ok) {
            li.className = 'text-success';
            li.querySelector('i').className = 'bi bi-check-circle-fill me-1';
          } else {
            li.className = 'text-muted';
            li.querySelector('i').className = 'bi bi-x-circle me-1';
          }
        });
        if (inpConfirmar.value) validarConfirmar();
      });

      inpConfirmar.addEventListener('input', validarConfirmar);
      inpConfirmar.addEventListener('blur', validarConfirmar);

      function validarConfirmar() {
        const ok = inpNueva.value === inpConfirmar.value && inpConfirmar.value !== '';
        marcar(inpConfirmar, ok);
        return ok;
      }

      // ── Guardar ───────────────────────────────────────────
      btnGuardar.addEventListener('click', async () => {
        const datosOk = await validarDatos();

        // Si hay algo escrito en nueva contraseña, validarla también
        const cambiaPassword = inpNueva.value.length > 0;
        let passOk = true;
        if (cambiaPassword) {
          passOk = passwordValida(inpNueva.value) && validarConfirmar();
          if (!passOk) {
            marcar(inpNueva, passwordValida(inpNueva.value));
            validarConfirmar();
          }
        }

        if (!datosOk || !passOk) return;

        const nuevoUsuario = {
          ...usuario,
          nombre:   inpNombre.value.trim(),
          email:    inpEmail.value.trim(),
          telefono: inpTelefono.value.trim()
        };
        if (cambiaPassword) {
          nuevoUsuario.password = inpNueva.value;
        }

        guardarUsuario(nuevoUsuario);
        setSesion({ ...nuevoUsuario, nombre: nuevoUsuario.nombre, email: nuevoUsuario.email });
        renderNavbar(); // actualiza nombre en la barra

        // Actualizar referencia local para nuevas validaciones
        usuario.nombre   = nuevoUsuario.nombre;
        usuario.email    = nuevoUsuario.email;
        usuario.telefono = nuevoUsuario.telefono;
        if (cambiaPassword) usuario.password = nuevoUsuario.password;

        // Resetear campos de contraseña
        if (cambiaPassword) {
          inpNueva.value = '';
          inpConfirmar.value = '';
          [inpNueva, inpConfirmar].forEach(i => {
            i.classList.remove('is-valid', 'is-invalid');
          });
          reglasPassword.forEach(r => {
            const li = document.getElementById(`regla-${r.id}`);
            if (li) {
              li.className = 'text-muted';
              li.querySelector('i').className = 'bi bi-x-circle me-1';
            }
          });
        }

        // Mostrar alerta de éxito
        const alertaEl = document.getElementById('alerta-perfil');
        alertaEl.classList.remove('d-none');
        setTimeout(() => alertaEl.classList.add('d-none'), 4000);
      });
    }

    // ── Crear campo de formulario ─────────────────────────────
    function crearCampo(nombre, label, tipo, valor) {
      const mb = document.createElement('div');
      mb.className = 'mb-3';

      const lbl = document.createElement('label');
      lbl.htmlFor = `campo-${nombre}`;
      lbl.className = 'form-label';
      lbl.textContent = label;

      const inp = document.createElement('input');
      inp.type = tipo;
      inp.id = `campo-${nombre}`;
      inp.name = nombre;
      inp.className = 'form-control';
      inp.value = valor;
      inp.autocomplete = 'off';

      const feedback = document.createElement('div');
      feedback.className = 'invalid-feedback';
      feedback.id = `feedback-${nombre}`;
      feedback.textContent = `${label} es requerido o no válido.`;

      mb.appendChild(lbl);
      mb.appendChild(inp);
      mb.appendChild(feedback);
      return mb;
    }
  </script>
</body>
</html>
