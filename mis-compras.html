<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mis compras · Liquid Pricing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4 py-md-5">

    <div class="lp-section-header mb-4">
      <h1 class="h3">Mis compras</h1>
    </div>

    <div id="contenido-compras"></div>

  </main>

  <footer class="lp-footer text-center py-4 mt-5 text-muted">
    <div class="container small">© 2026 Liquid Pricing · Comparador de precios · Proyecto académico DSY2202</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { renderNavbar } from './js/ui.js';
    import { requiereRol } from './js/auth.js';
    import { formatoCLP } from './js/ui.js';
    import { getCompras } from './js/carrito.js';

    requiereRol('cliente');
    renderNavbar();

    const contenedor = document.getElementById('contenido-compras');
    const compras = getCompras();

    if (compras.length === 0) {
      renderVacio();
    } else {
      // Mostrar más reciente primero
      const ordenadas = [...compras].sort((a, b) => b.id - a.id);
      renderCompras(ordenadas);
    }

    // ── Estado vacío ──────────────────────────────────────────
    function renderVacio() {
      const wrap = document.createElement('div');
      wrap.className = 'text-center py-5';

      const icon = document.createElement('i');
      icon.className = 'bi bi-bag';
      icon.style.cssText = 'font-size:3.5rem; color:var(--lp-muted);';

      const msg = document.createElement('p');
      msg.className = 'mt-3 text-muted fs-5';
      msg.textContent = 'Aún no tienes compras registradas.';

      const sub = document.createElement('p');
      sub.className = 'text-muted small';
      sub.textContent = 'Explora el catálogo y encuentra los mejores precios.';

      const btn = document.createElement('a');
      btn.href = 'catalogo.html';
      btn.className = 'btn btn-primary mt-2';
      btn.innerHTML = '<i class="bi bi-grid me-2"></i>Ver catálogo';

      wrap.appendChild(icon);
      wrap.appendChild(msg);
      wrap.appendChild(sub);
      wrap.appendChild(btn);
      contenedor.appendChild(wrap);
    }

    // ── Lista de órdenes ──────────────────────────────────────
    function renderCompras(ordenes) {
      const accordionId = 'accordion-compras';
      const accordion = document.createElement('div');
      accordion.className = 'accordion';
      accordion.id = accordionId;

      ordenes.forEach((orden, idx) => {
        const itemId = `orden-${idx}`;
        const collapseId = `collapse-${idx}`;
        const totalItems = orden.items.reduce((acc, i) => acc + i.cantidad, 0);
        const fecha = new Date(orden.fecha).toLocaleDateString('es-CL', {
          year: 'numeric', month: 'long', day: 'numeric'
        });

        const item = document.createElement('div');
        item.className = 'accordion-item mb-3 border rounded';
        item.id = itemId;

        // Header del accordion
        const header = document.createElement('h2');
        header.className = 'accordion-header';

        const btn = document.createElement('button');
        btn.className = 'accordion-button collapsed';
        btn.type = 'button';
        btn.setAttribute('data-bs-toggle', 'collapse');
        btn.setAttribute('data-bs-target', `#${collapseId}`);
        btn.setAttribute('aria-expanded', 'false');
        btn.setAttribute('aria-controls', collapseId);

        // Contenido del header: id, fecha, estado, total
        const headerContent = document.createElement('div');
        headerContent.className = 'w-100 d-flex flex-wrap align-items-center gap-3 pe-3';

        const ordenNum = document.createElement('span');
        ordenNum.className = 'fw-semibold';
        ordenNum.textContent = `Orden #${orden.id}`;

        const fechaEl = document.createElement('span');
        fechaEl.className = 'text-muted small';
        fechaEl.innerHTML = `<i class="bi bi-calendar3 me-1"></i>${fecha}`;

        const estadoBadge = document.createElement('span');
        estadoBadge.className = 'badge bg-success';
        estadoBadge.textContent = orden.estado;

        const totalEl = document.createElement('span');
        totalEl.className = 'fw-bold text-lp-primary ms-auto';
        totalEl.textContent = formatoCLP(orden.total);

        headerContent.appendChild(ordenNum);
        headerContent.appendChild(fechaEl);
        headerContent.appendChild(estadoBadge);
        headerContent.appendChild(totalEl);
        btn.appendChild(headerContent);
        header.appendChild(btn);

        // Cuerpo colapsable
        const collapseDiv = document.createElement('div');
        collapseDiv.id = collapseId;
        collapseDiv.className = 'accordion-collapse collapse';
        collapseDiv.setAttribute('data-bs-parent', `#${accordionId}`);

        const body = document.createElement('div');
        body.className = 'accordion-body p-0';

        // Tabla de ítems
        const tableWrap = document.createElement('div');
        tableWrap.className = 'table-responsive';

        const tabla = document.createElement('table');
        tabla.className = 'tabla-ofertas w-100';

        const thead = document.createElement('thead');
        const trHead = document.createElement('tr');
        ['Producto', 'Tienda', 'Cantidad', 'Precio unit.', 'Subtotal'].forEach(col => {
          const th = document.createElement('th');
          th.textContent = col;
          trHead.appendChild(th);
        });
        thead.appendChild(trHead);

        const tbody = document.createElement('tbody');
        orden.items.forEach(item => {
          const tr = document.createElement('tr');

          const tdNombre = document.createElement('td');
          tdNombre.className = 'fw-semibold';
          tdNombre.textContent = item.nombre;

          const tdTienda = document.createElement('td');
          const tiendaSpan = document.createElement('span');
          tiendaSpan.className = 'nombre-tienda';
          tiendaSpan.textContent = item.tienda;
          tdTienda.appendChild(tiendaSpan);

          const tdCant = document.createElement('td');
          tdCant.textContent = item.cantidad;

          const tdPrecio = document.createElement('td');
          tdPrecio.className = 'precio-oferta';
          tdPrecio.textContent = formatoCLP(item.precio);

          const tdSubtotal = document.createElement('td');
          tdSubtotal.className = 'precio-oferta fw-semibold';
          tdSubtotal.textContent = formatoCLP(item.precio * item.cantidad);

          tr.appendChild(tdNombre);
          tr.appendChild(tdTienda);
          tr.appendChild(tdCant);
          tr.appendChild(tdPrecio);
          tr.appendChild(tdSubtotal);
          tbody.appendChild(tr);
        });

        tabla.appendChild(thead);
        tabla.appendChild(tbody);
        tableWrap.appendChild(tabla);

        // Pie con total y unidades
        const pie = document.createElement('div');
        pie.className = 'd-flex justify-content-between align-items-center p-3 border-top bg-light rounded-bottom';

        const unidades = document.createElement('span');
        unidades.className = 'text-muted small';
        unidades.textContent = `${totalItems} unidad${totalItems !== 1 ? 'es' : ''}`;

        const totalPie = document.createElement('span');
        totalPie.className = 'fw-bold fs-5 text-lp-primary';
        totalPie.textContent = `Total: ${formatoCLP(orden.total)}`;

        pie.appendChild(unidades);
        pie.appendChild(totalPie);

        body.appendChild(tableWrap);
        body.appendChild(pie);
        collapseDiv.appendChild(body);

        item.appendChild(header);
        item.appendChild(collapseDiv);
        accordion.appendChild(item);
      });

      contenedor.appendChild(accordion);
    }
  </script>
</body>
</html>
