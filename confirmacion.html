<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Confirmación · Liquid Pricing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4 py-md-5">
    <div id="contenido-confirmacion"></div>
  </main>

  <footer class="lp-footer text-center py-4 mt-5 text-muted">
    <div class="container small">© 2026 Liquid Pricing · Comparador de precios · Proyecto académico DSY2202</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { renderNavbar } from './js/ui.js';
    import { requiereRol } from './js/auth.js';
    import { formatoCLP } from './js/ui.js';

    requiereRol('cliente');
    renderNavbar();

    const contenedor = document.getElementById('contenido-confirmacion');

    const rawOrden = sessionStorage.getItem('lp_ultima_orden');
    // Limpiar de inmediato para que un refresh no repita la impresión
    sessionStorage.removeItem('lp_ultima_orden');

    if (!rawOrden) {
      renderSinOrden();
    } else {
      let orden;
      try {
        orden = JSON.parse(rawOrden);
      } catch (_) {
        renderSinOrden();
        return;
      }
      renderConfirmacion(orden);
    }

    // ── Sin orden reciente ────────────────────────────────────
    function renderSinOrden() {
      const wrap = document.createElement('div');
      wrap.className = 'text-center py-5';

      const icon = document.createElement('i');
      icon.className = 'bi bi-receipt';
      icon.style.cssText = 'font-size:3.5rem; color:var(--lp-muted);';

      const msg = document.createElement('p');
      msg.className = 'mt-3 text-muted fs-5';
      msg.textContent = 'No hay una orden reciente.';

      const sub = document.createElement('p');
      sub.className = 'text-muted small';
      sub.textContent = 'Realiza una compra desde el catálogo para ver la confirmación aquí.';

      const btn = document.createElement('a');
      btn.href = 'catalogo.html';
      btn.className = 'btn btn-primary mt-2';
      btn.innerHTML = '<i class="bi bi-grid me-2"></i>Ir al catálogo';

      wrap.appendChild(icon);
      wrap.appendChild(msg);
      wrap.appendChild(sub);
      wrap.appendChild(btn);
      contenedor.appendChild(wrap);
    }

    // ── Confirmación de compra ────────────────────────────────
    function renderConfirmacion(orden) {
      const totalItems = orden.items.reduce((acc, i) => acc + i.cantidad, 0);
      const fecha = new Date(orden.fecha).toLocaleDateString('es-CL', {
        year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });

      const wrap = document.createElement('div');
      wrap.className = 'row justify-content-center';

      const col = document.createElement('div');
      col.className = 'col-12 col-md-8 col-lg-6';

      const card = document.createElement('div');
      card.className = 'lp-card text-center';

      // Ícono éxito
      const iconWrap = document.createElement('div');
      iconWrap.className = 'mb-3';
      const iconEl = document.createElement('i');
      iconEl.className = 'bi bi-check-circle-fill text-success';
      iconEl.style.fontSize = '4rem';
      iconWrap.appendChild(iconEl);

      // Título
      const titulo = document.createElement('h1');
      titulo.className = 'h3 mb-1';
      titulo.textContent = '¡Pago realizado con éxito!';

      // Subtítulo simulado
      const simulado = document.createElement('p');
      simulado.className = 'text-muted mb-4';
      simulado.textContent = 'Esta es una transacción simulada. No se procesó ningún pago real.';

      // Detalles de la orden
      const detalles = document.createElement('div');
      detalles.className = 'text-start mb-4';

      detalles.appendChild(crearDetalleFila('Número de orden', `#${orden.id}`));
      detalles.appendChild(crearDetalleFila('Fecha', fecha));
      detalles.appendChild(crearDetalleFila('Total', formatoCLP(orden.total)));
      detalles.appendChild(crearDetalleFila('Productos', `${totalItems} unidad${totalItems !== 1 ? 'es' : ''}`));
      detalles.appendChild(crearDetalleFila('Estado', '', 'badge bg-success'));

      const divider = document.createElement('hr');
      divider.className = 'lp-divider my-3';

      // Botones de acción
      const acciones = document.createElement('div');
      acciones.className = 'd-grid gap-2 d-sm-flex justify-content-sm-center';

      const btnCompras = document.createElement('a');
      btnCompras.href = 'mis-compras.html';
      btnCompras.className = 'btn btn-primary';
      btnCompras.innerHTML = '<i class="bi bi-bag-check me-2"></i>Ver mis compras';

      const btnCatalogo = document.createElement('a');
      btnCatalogo.href = 'catalogo.html';
      btnCatalogo.className = 'btn btn-outline-primary';
      btnCatalogo.innerHTML = '<i class="bi bi-grid me-2"></i>Seguir comprando';

      acciones.appendChild(btnCompras);
      acciones.appendChild(btnCatalogo);

      card.appendChild(iconWrap);
      card.appendChild(titulo);
      card.appendChild(simulado);
      card.appendChild(detalles);
      card.appendChild(divider);
      card.appendChild(acciones);
      col.appendChild(card);
      wrap.appendChild(col);
      contenedor.appendChild(wrap);
    }

    // ── Fila de detalle ───────────────────────────────────────
    function crearDetalleFila(etiqueta, valor, badgeClass = null) {
      const fila = document.createElement('div');
      fila.className = 'd-flex justify-content-between align-items-center py-2 border-bottom';

      const lbl = document.createElement('span');
      lbl.className = 'text-muted small';
      lbl.textContent = etiqueta;

      const val = document.createElement('span');
      val.className = 'fw-semibold';
      if (badgeClass) {
        const badge = document.createElement('span');
        badge.className = badgeClass;
        badge.textContent = 'Pagado';
        val.appendChild(badge);
      } else {
        val.textContent = valor;
      }

      fila.appendChild(lbl);
      fila.appendChild(val);
      return fila;
    }
  </script>
</body>
</html>
