<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Detalle de producto · Liquid Pricing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4 py-md-5">
    <div id="contenido-producto">
      <!-- Inyectado por JS -->
    </div>
  </main>

  <!-- Toast "Agregado al carrito" -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:1100;">
    <div id="toast-carrito" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body">
          <i class="bi bi-cart-check-fill me-2"></i>Producto agregado al carrito.
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Cerrar"></button>
      </div>
    </div>
  </div>

  <footer class="lp-footer text-center py-4 mt-5 text-muted">
    <div class="container small">© 2026 Liquid Pricing · Comparador de precios · Proyecto académico DSY2202</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { renderNavbar } from './js/ui.js';
    import { requiereRol } from './js/auth.js';
    import { getProducto } from './js/datos.js';
    import { formatoCLP, estrellas } from './js/ui.js';
    import { agregar } from './js/carrito.js';

    requiereRol('cliente');
    renderNavbar();

    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const contenedor = document.getElementById('contenido-producto');

    if (!id) {
      mostrarNoEncontrado();
    } else {
      const producto = await getProducto(id);
      if (!producto) {
        mostrarNoEncontrado();
      } else {
        renderProducto(producto);
      }
    }

    // ── Producto no encontrado ────────────────────────────────
    function mostrarNoEncontrado() {
      const wrap = document.createElement('div');
      wrap.className = 'text-center py-5';

      const icon = document.createElement('i');
      icon.className = 'bi bi-box-seam';
      icon.style.cssText = 'font-size:3rem; color:var(--lp-muted);';

      const msg = document.createElement('p');
      msg.className = 'mt-3 text-muted fs-5';
      msg.textContent = 'Producto no encontrado.';

      const link = document.createElement('a');
      link.href = 'catalogo.html';
      link.className = 'btn btn-primary mt-2';
      link.textContent = 'Volver al catálogo';

      wrap.appendChild(icon);
      wrap.appendChild(msg);
      wrap.appendChild(link);
      contenedor.appendChild(wrap);
    }

    // ── Render principal ──────────────────────────────────────
    function renderProducto(p) {
      // Ofertas ordenadas de menor a mayor precio
      const ofertas = [...p.ofertas].sort((a, b) => a.precio - b.precio);
      const ofertaMasBarata = ofertas[0];

      // Breadcrumb / volver
      const backLink = document.createElement('a');
      backLink.href = 'catalogo.html';
      backLink.className = 'd-inline-flex align-items-center gap-1 text-muted mb-4 small';
      backLink.innerHTML = '<i class="bi bi-arrow-left"></i>';
      const backText = document.createTextNode(' Volver al catálogo');
      backLink.appendChild(backText);

      // Layout 2 columnas
      const row = document.createElement('div');
      row.className = 'row g-4 g-md-5';

      // ── Columna imagen ──────────────────────────────────────
      const colImg = document.createElement('div');
      colImg.className = 'col-12 col-md-5';

      const imgCard = document.createElement('div');
      imgCard.className = 'lp-card p-3 text-center';

      const img = document.createElement('img');
      img.src = p.imagen;
      img.alt = p.nombre;
      img.className = 'img-fluid';
      img.style.maxHeight = '320px';
      img.style.objectFit = 'contain';

      imgCard.appendChild(img);
      colImg.appendChild(imgCard);

      // ── Columna info ────────────────────────────────────────
      const colInfo = document.createElement('div');
      colInfo.className = 'col-12 col-md-7';

      // Categoría
      const catBadge = document.createElement('span');
      catBadge.className = 'badge-categoria mb-2 d-inline-block';
      catBadge.textContent = p.categoria.charAt(0).toUpperCase() + p.categoria.slice(1);

      // Nombre
      const titulo = document.createElement('h1');
      titulo.className = 'h3 lp-heading mt-1 mb-2';
      titulo.textContent = p.nombre;

      // Estrellas
      const estrellaDiv = document.createElement('div');
      estrellaDiv.className = 'mb-3';
      estrellaDiv.innerHTML = estrellas(p.rating);

      // Descripción
      const desc = document.createElement('p');
      desc.className = 'text-muted mb-4';
      desc.textContent = p.descripcion;

      // Mejor precio destacado
      const precioWrap = document.createElement('div');
      precioWrap.className = 'mb-3';
      const precioLabel = document.createElement('span');
      precioLabel.className = 'text-muted small me-2';
      precioLabel.textContent = 'Desde';
      const precioBadge = document.createElement('span');
      precioBadge.className = 'badge-mejor-precio';
      precioBadge.textContent = formatoCLP(ofertaMasBarata.precio);
      precioWrap.appendChild(precioLabel);
      precioWrap.appendChild(precioBadge);

      // Botones de acción
      const acciones = document.createElement('div');
      acciones.className = 'd-flex flex-wrap gap-2 mb-4';

      const btnCarrito = document.createElement('button');
      btnCarrito.type = 'button';
      btnCarrito.className = 'btn btn-primary';
      btnCarrito.innerHTML = '<i class="bi bi-cart-plus me-2"></i>Agregar al carrito';

      acciones.appendChild(btnCarrito);

      // Tabla de comparación
      const tablaSection = document.createElement('div');
      tablaSection.className = 'lp-section-header mb-3 mt-2';
      const tablaTitle = document.createElement('h2');
      tablaTitle.className = 'h5';
      tablaTitle.textContent = 'Comparación de precios';
      tablaSection.appendChild(tablaTitle);

      const tablaWrap = document.createElement('div');
      tablaWrap.className = 'table-responsive';

      const tabla = document.createElement('table');
      tabla.className = 'tabla-ofertas w-100';

      const thead = document.createElement('thead');
      const trHead = document.createElement('tr');
      ['Tienda', 'Precio', 'Envío', 'Acción'].forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        trHead.appendChild(th);
      });
      thead.appendChild(trHead);

      const tbody = document.createElement('tbody');
      ofertas.forEach((o, i) => {
        const tr = document.createElement('tr');
        if (i === 0) tr.classList.add('fila-mejor');

        // Tienda
        const tdTienda = document.createElement('td');
        const tiendaSpan = document.createElement('span');
        tiendaSpan.className = 'nombre-tienda';
        tiendaSpan.textContent = o.tienda;
        if (i === 0) {
          const mejorBadge = document.createElement('span');
          mejorBadge.className = 'badge-mejor-precio ms-2';
          mejorBadge.textContent = 'Mejor precio';
          tdTienda.appendChild(tiendaSpan);
          tdTienda.appendChild(mejorBadge);
        } else {
          tdTienda.appendChild(tiendaSpan);
        }

        // Precio
        const tdPrecio = document.createElement('td');
        const precioSpan = document.createElement('span');
        precioSpan.className = 'precio-oferta' + (i === 0 ? ' mejor' : '');
        precioSpan.textContent = formatoCLP(o.precio);
        tdPrecio.appendChild(precioSpan);

        // Envío
        const tdEnvio = document.createElement('td');
        const envioSpan = document.createElement('span');
        const esGratis = o.envio === 'Gratis' || o.envio?.toLowerCase?.() === 'gratis';
        envioSpan.className = esGratis ? 'envio-gratis' : 'envio-pago';
        envioSpan.textContent = o.envio;
        tdEnvio.appendChild(envioSpan);

        // Acción
        const tdAccion = document.createElement('td');
        const linkTienda = document.createElement('a');
        linkTienda.href = o.link;
        linkTienda.target = '_blank';
        linkTienda.rel = 'noopener';
        linkTienda.className = 'btn btn-sm btn-outline-primary btn-tienda';
        linkTienda.innerHTML = '<i class="bi bi-box-arrow-up-right me-1"></i>Ir a la tienda';
        tdAccion.appendChild(linkTienda);

        tr.appendChild(tdTienda);
        tr.appendChild(tdPrecio);
        tr.appendChild(tdEnvio);
        tr.appendChild(tdAccion);
        tbody.appendChild(tr);
      });

      tabla.appendChild(thead);
      tabla.appendChild(tbody);
      tablaWrap.appendChild(tabla);

      // Ensamblar columna info
      colInfo.appendChild(catBadge);
      colInfo.appendChild(titulo);
      colInfo.appendChild(estrellaDiv);
      colInfo.appendChild(desc);
      colInfo.appendChild(precioWrap);
      colInfo.appendChild(acciones);
      colInfo.appendChild(tablaSection);
      colInfo.appendChild(tablaWrap);

      row.appendChild(colImg);
      row.appendChild(colInfo);

      contenedor.appendChild(backLink);
      contenedor.appendChild(row);

      // ── Eventos ───────────────────────────────────────────
      btnCarrito.addEventListener('click', () => {
        agregar(p, ofertaMasBarata);
        renderNavbar();
        const toastEl = document.getElementById('toast-carrito');
        const toast = bootstrap.Toast.getOrCreateInstance(toastEl);
        toast.show();
      });

    }
  </script>
</body>
</html>
