<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catálogo · Liquid Pricing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <!-- Hero -->
  <section class="lp-hero">
    <div class="container text-center">
      <h1>Catálogo de productos</h1>
      <p class="lead mt-2">
        Compara precios de las mejores tiendas en un solo lugar.
        <br>
        <span class="hero-accent">Siempre encuentra la mejor oferta.</span>
      </p>
    </div>
  </section>

  <main class="container py-4 py-md-5">

    <!-- Controles: búsqueda + categorías -->
    <div class="row g-3 align-items-center mb-4">
      <div class="col-12 col-md-5">
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0">
            <i class="bi bi-search text-muted"></i>
          </span>
          <input
            type="search"
            id="buscador"
            class="form-control border-start-0"
            placeholder="Buscar producto…"
            autocomplete="off"
          >
        </div>
      </div>
      <div class="col-12 col-md-7">
        <div id="filtros-categoria" class="d-flex flex-wrap gap-2">
          <!-- Pills de categoría inyectadas por JS -->
        </div>
      </div>
    </div>

    <!-- Cuadrícula de productos -->
    <div id="grid-productos" class="row g-4">
      <!-- Cards inyectadas por JS -->
    </div>

    <!-- Estado vacío -->
    <div id="estado-vacio" class="text-center py-5 d-none">
      <i class="bi bi-search" style="font-size:3rem; color:var(--lp-muted);"></i>
      <p class="mt-3 text-muted fs-5">No se encontraron productos para tu búsqueda.</p>
      <button id="btn-limpiar" class="btn btn-outline-primary mt-2">Limpiar filtros</button>
    </div>

  </main>

  <footer class="lp-footer text-center py-4 mt-5 text-muted">
    <div class="container small">© 2026 Liquid Pricing · Comparador de precios · Proyecto académico DSY2202</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { renderNavbar } from './js/ui.js';
    import { requiereRol } from './js/auth.js';
    import { getProductos, mejorPrecio } from './js/datos.js';
    import { formatoCLP, estrellas } from './js/ui.js';
    import { esFavorito, toggleFavorito } from './js/carrito.js';

    requiereRol('cliente');
    renderNavbar();

    let todosLosProductos = [];
    let categoriaActiva = 'Todas';

    // ── Carga inicial ──────────────────────────────────────────
    todosLosProductos = await getProductos();
    construirFiltros(todosLosProductos);
    renderGrilla(todosLosProductos);

    // ── Búsqueda en vivo ───────────────────────────────────────
    document.getElementById('buscador').addEventListener('input', (e) => {
      renderFiltrado(e.target.value.trim(), categoriaActiva);
    });

    // ── Limpiar filtros ────────────────────────────────────────
    document.getElementById('btn-limpiar').addEventListener('click', () => {
      document.getElementById('buscador').value = '';
      categoriaActiva = 'Todas';
      actualizarPills();
      renderGrilla(todosLosProductos);
    });

    // ── Filtros de categoría ───────────────────────────────────
    function construirFiltros(productos) {
      const cats = ['Todas', ...new Set(productos.map(p => p.categoria))];
      const contenedor = document.getElementById('filtros-categoria');
      contenedor.innerHTML = '';
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'filtro-chip' + (cat === categoriaActiva ? ' activo' : '');
        btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        btn.dataset.cat = cat;
        btn.addEventListener('click', () => {
          categoriaActiva = cat;
          actualizarPills();
          renderFiltrado(document.getElementById('buscador').value.trim(), categoriaActiva);
        });
        contenedor.appendChild(btn);
      });
    }

    function actualizarPills() {
      document.querySelectorAll('#filtros-categoria .filtro-chip').forEach(btn => {
        btn.classList.toggle('activo', btn.dataset.cat === categoriaActiva);
      });
    }

    // ── Filtrado combinado ─────────────────────────────────────
    function renderFiltrado(query, categoria) {
      let resultado = todosLosProductos;
      if (categoria !== 'Todas') {
        resultado = resultado.filter(p => p.categoria === categoria);
      }
      if (query) {
        const q = query.toLowerCase();
        resultado = resultado.filter(p => p.nombre.toLowerCase().includes(q));
      }
      renderGrilla(resultado);
    }

    // ── Render de la grilla ────────────────────────────────────
    function renderGrilla(productos) {
      const grid       = document.getElementById('grid-productos');
      const estadoVacio = document.getElementById('estado-vacio');
      grid.innerHTML = '';

      if (productos.length === 0) {
        estadoVacio.classList.remove('d-none');
        return;
      }
      estadoVacio.classList.add('d-none');

      productos.forEach(p => {
        const col = document.createElement('div');
        col.className = 'col-12 col-sm-6 col-lg-4 col-xl-3';
        col.appendChild(crearCard(p));
        grid.appendChild(col);
      });
    }

    // ── Creación de card (DOM seguro) ──────────────────────────
    function crearCard(p) {
      const precio = mejorPrecio(p);
      const fav    = esFavorito(p.id);

      const card = document.createElement('div');
      card.className = 'card-producto';

      // Imagen
      const imgWrap = document.createElement('div');
      imgWrap.className = 'card-img-wrap';
      const img = document.createElement('img');
      img.src = p.imagen;
      img.alt = p.nombre;         // nombre seguro como alt, no innerHTM
      img.loading = 'lazy';
      imgWrap.appendChild(img);

      // Cuerpo
      const body = document.createElement('div');
      body.className = 'card-body';

      // Categoría
      const catBadge = document.createElement('span');
      catBadge.className = 'badge-categoria mb-2 d-inline-block';
      catBadge.textContent = p.categoria.charAt(0).toUpperCase() + p.categoria.slice(1);

      // Nombre
      const titulo = document.createElement('h2');
      titulo.className = 'card-title';
      titulo.textContent = p.nombre;

      // Estrellas (HTML estático generado por ui.js)
      const estrellaDiv = document.createElement('div');
      estrellaDiv.className = 'mb-2';
      estrellaDiv.innerHTML = estrellas(p.rating);

      // Mejor precio
      const precioEl = document.createElement('div');
      precioEl.className = 'card-precio';
      const badge = document.createElement('span');
      badge.className = 'badge-mejor-precio';
      badge.textContent = formatoCLP(precio);
      precioEl.appendChild(badge);

      // Cantidad de tiendas
      const tiendas = document.createElement('p');
      tiendas.className = 'card-oferta-count';
      tiendas.textContent = `Comparado en ${p.ofertas.length} tienda${p.ofertas.length !== 1 ? 's' : ''}`;

      // Footer acciones
      const footer = document.createElement('div');
      footer.className = 'card-footer-actions';

      // Botón favorito
      const btnFav = document.createElement('button');
      btnFav.type = 'button';
      btnFav.className = 'btn btn-sm btn-outline-secondary';
      btnFav.setAttribute('aria-label', fav ? 'Quitar de favoritos' : 'Agregar a favoritos');
      btnFav.innerHTML = `<i class="bi ${fav ? 'bi-heart-fill text-danger' : 'bi-heart'}"></i>`;
      btnFav.addEventListener('click', () => {
        const nuevoEstado = toggleFavorito(p.id);
        btnFav.innerHTML = `<i class="bi ${nuevoEstado ? 'bi-heart-fill text-danger' : 'bi-heart'}"></i>`;
        btnFav.setAttribute('aria-label', nuevoEstado ? 'Quitar de favoritos' : 'Agregar a favoritos');
      });

      // Botón ver ofertas
      const btnVer = document.createElement('a');
      btnVer.className = 'btn btn-primary btn-sm flex-grow-1';
      btnVer.href = `producto.html?id=${p.id}`;
      btnVer.textContent = 'Ver ofertas';

      footer.appendChild(btnFav);
      footer.appendChild(btnVer);

      body.appendChild(catBadge);
      body.appendChild(titulo);
      body.appendChild(estrellaDiv);
      body.appendChild(precioEl);
      body.appendChild(tiendas);
      body.appendChild(footer);

      card.appendChild(imgWrap);
      card.appendChild(body);

      return card;
    }
  </script>
</body>
</html>
